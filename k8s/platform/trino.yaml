apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-catalog
  namespace: data
data:
  hive.properties: |
    connector.name=hive
    hive.metastore.uri=thrift://hive-metastore:9083
    fs.native-s3.enabled=true
    s3.endpoint=http://minio:9000
    s3.aws-access-key=${ENV:AWS_ACCESS_KEY_ID}
    s3.aws-secret-key=${ENV:AWS_SECRET_ACCESS_KEY}
    s3.path-style-access=true
    s3.region=us-east-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trino
  template:
    metadata:
      labels:
        app: trino
    spec:
      containers:
        - name: trino
          image: trinodb/trino:476
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: MINIO_ROOT_PASSWORD
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: catalog
              mountPath: /etc/trino/catalog
      volumes:
        - name: catalog
          configMap:
            name: trino-catalog
---
apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: data
spec:
  selector:
    app: trino
  ports:
    - name: http
      port: 8080
      targetPort: http
